<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ZYC silver polka-dot icon</title>
  <desc id="desc">A pure silver circular icon with pure white polka dots and a clean ZYC wordmark.</desc>
  <defs>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="232"/>
    </clipPath>
    <pattern id="dots" width="58" height="58" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="6.8" fill="#ffffff"/>
      <circle cx="43" cy="43" r="6.8" fill="#ffffff"/>
    </pattern>
  </defs>

  <circle cx="256" cy="256" r="232" fill="#c8c8c8"/>
  <g clip-path="url(#circle)">
    <rect width="512" height="512" fill="url(#dots)"/>
  </g>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#ffffff" stroke-width="8"/>

  <text
    x="256"
    y="284"
    text-anchor="middle"
    fill="#ffffff"
    stroke="#c8c8c8"
    stroke-width="7"
    paint-order="stroke fill"
    font-family="Avenir Next, Helvetica Neue, Arial, sans-serif"
    font-size="92"
    font-weight="500"
    letter-spacing="14">ZYC</text>
</svg>
